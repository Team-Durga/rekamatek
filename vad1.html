<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipari Forradalom Kvíz 1</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.quiz-box{
    background:#1e293b;
    width:100%;
    max-width:800px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#38bdf8;
}

.question{
    font-size:24px;
    margin:20px 0;
}

.answers button{
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.answers button:hover{
    background:#475569;
}

.correct{
    background:green !important;
}

.wrong{
    background:crimson !important;
}

#nextBtn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    margin-top:20px;
    display:none;
    cursor:pointer;
}

#score{
    font-size:28px;
    text-align:center;
    margin-top:20px;
}
</style>
</head>

{

]

{

answers:[

]
},

{
question:"Milyen energiahordozó jelent meg?",
answers:[

]
},

{
question:"Kik készítették az első repülőgépet?",
answers:[

]

];

let currentQuestion = 0;
let score = 0;

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const scoreDiv = document.getElementById("score");
const counter = document.getElementById("counter");

function showQuestion(){

    answers.innerHTML = "";

    let q = quiz[currentQuestion];

    counter.innerText =
    `Kérdés ${currentQuestion+1} / ${quiz.length}`;

    question.innerText = q.question;

    q.answers.forEach(answer=>{

        const btn = document.createElement("button");

        btn.innerText = answer.text;

        btn.onclick = ()=>selectAnswer(btn,answer.correct);

        answers.appendChild(btn);
    });
}

function selectAnswer(btn,correct){

    const buttons = answers.querySelectorAll("button");

    buttons.forEach(button=>button.disabled=true);

    if(correct){
        btn.classList.add("correct");
        score++;
    }else{
        btn.classList.add("wrong");

        buttons.forEach((button,index)=>{
            if(quiz[currentQuestion].answers[index].correct){
                button.classList.add("correct");
            }
        });
    }

    nextBtn.style.display="block";
}

nextBtn.onclick=()=>{

    currentQuestion++;

    nextBtn.style.display="none";

    if(currentQuestion<quiz.length){
        showQuestion();
    }else{
        question.innerText="Vége!";
        answers.innerHTML="";
        counter.innerHTML="";
        scoreDiv.innerHTML=`Pontszám: ${score}/${quiz.length}`;
    }
}

showQuestion();

</script>

</body>
</html>
